version: "3.9"

services:

  # ── PostgreSQL 15 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: spent
      POSTGRES_PASSWORD: spent
      POSTGRES_DB: spent
    ports:
      - "5432:5432"             # expose for local tools (TablePlus, psql, etc.)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spent -d spent"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy   # wait for postgres to be ready
    volumes:
      - ./backend:/app             # hot-reload: code changes reflect immediately
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Telegram Bot ─────────────────────────────────────────────────────────
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:    # named volume — survives `docker-compose down`
