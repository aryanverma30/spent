# Alembic configuration file.
# The `alembic` CLI looks for this file in the current directory.
# Run migrations from inside the backend/ directory or the Docker container.
#
# Common commands:
#   alembic upgrade head                    — apply all pending migrations
#   alembic revision --autogenerate -m ""  — generate a new migration from model changes
#   alembic downgrade -1                    — roll back the last migration
#   alembic current                         — show the current migration version
#   alembic history                         — show all migrations

[alembic]
# Path to the alembic directory (relative to this file)
script_location = alembic

# The database URL is set dynamically in alembic/env.py from settings.database_url
# so we leave this blank here.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
