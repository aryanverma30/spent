<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>💸 Spent</title>
  <style>
    /* ── Design tokens (matching widget palette exactly) ─────────────────── */
    :root {
      --bg-primary:    #1A1A2E;
      --bg-card:       #16213E;
      --bg-elevated:   #0F3460;
      --accent:        #4ECDC4;
      --accent-dim:    rgba(78, 205, 196, 0.15);
      --accent-text:   #1A1A2E;
      --text-primary:  #FFFFFF;
      --text-secondary:#AAAAAA;
      --text-muted:    #555575;
      --danger:        #FF6B6B;
      --radius-card:   16px;
      --radius-pill:   100px;
      --shadow-card:   0 4px 24px rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 48px;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .header-icon {
      font-size: 28px;
    }

    /* ── Period tabs ─────────────────────────────────────────────────────── */
    .period-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-card);
      border-radius: var(--radius-pill);
      padding: 4px;
      margin: 16px 20px;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      font-family: inherit;
    }
    .tab-btn.active {
      background: var(--accent);
      color: var(--accent-text);
      font-weight: 700;
    }

    /* ── Hero (total spent) ──────────────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 8px 20px 24px;
    }
    .hero-label {
      font-size: 13px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .hero-amount {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text-primary);
    }
    .hero-period {
      font-size: 14px;
      color: var(--accent);
      margin-top: 6px;
      font-weight: 500;
    }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      padding: 18px;
      margin: 0 20px 16px;
      box-shadow: var(--shadow-card);
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 14px;
    }

    /* ── Charts row ──────────────────────────────────────────────────────── */
    .charts-row {
      display: flex;
      gap: 12px;
      margin: 0 20px 16px;
    }
    .chart-card {
      flex: 1;
      background: var(--bg-card);
      border-radius: var(--radius-card);
      padding: 14px;
      box-shadow: var(--shadow-card);
      min-height: 140px;
      display: flex;
      flex-direction: column;
    }
    .chart-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }
    .chart-card img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      display: block;
    }
    .chart-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Category chips ─────────────────────────────────────────────────── */
    .category-chips-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0 20px 4px;
      margin-bottom: 16px;
    }
    .category-chips-scroll::-webkit-scrollbar { display: none; }
    .category-chips-inner {
      display: flex;
      gap: 8px;
      width: max-content;
    }
    .cat-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: var(--bg-card);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      min-width: 72px;
      box-shadow: var(--shadow-card);
      -webkit-tap-highlight-color: transparent;
    }
    .cat-chip.active {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .cat-chip-emoji { font-size: 20px; line-height: 1; }
    .cat-chip-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .cat-chip.active .cat-chip-name { color: var(--accent); }
    .cat-chip-amount {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* ── Category breakdown ──────────────────────────────────────────────── */
    .category-row {
      margin-bottom: 14px;
    }
    .category-row:last-child { margin-bottom: 0; }
    .category-header {
      display: flex;
      align-items: center;
      margin-bottom: 7px;
      gap: 8px;
    }
    .category-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .category-name {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }
    .category-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-right: 6px;
    }
    .category-amount {
      font-size: 14px;
      font-weight: 700;
    }
    .progress-track {
      height: 5px;
      background: var(--bg-elevated);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      width: 0;
      transition: width 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Transactions ────────────────────────────────────────────────────── */
    .tx-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bg-elevated);
    }
    .tx-row:last-child { border-bottom: none; padding-bottom: 0; }
    .tx-row:first-child { padding-top: 0; }
    .tx-icon {
      font-size: 22px;
      width: 36px;
      height: 36px;
      background: var(--bg-elevated);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tx-details { flex: 1; min-width: 0; }
    .tx-merchant {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-meta {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .tx-amount {
      font-size: 15px;
      font-weight: 700;
      color: var(--danger);
      flex-shrink: 0;
    }

    /* ── AI Insights ─────────────────────────────────────────────────────── */
    .insights-card {
      background: var(--accent-dim);
      border: 1px solid rgba(78, 205, 196, 0.25);
      border-radius: 12px;
      padding: 14px;
    }
    .insights-icon {
      font-size: 20px;
      margin-bottom: 8px;
    }
    .insights-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-primary);
    }

    /* ── Skeleton shimmer ────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(
        90deg,
        var(--bg-card) 25%,
        var(--bg-elevated) 50%,
        var(--bg-card) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      color: transparent !important;
      user-select: none;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Error state ─────────────────────────────────────────────────────── */
    .error-text {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      padding: 12px 0;
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
      padding: 16px 0;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Header -->
    <div class="header">
      <div>
        <div class="header-title">💸 Spent</div>
        <div class="header-subtitle">Personal spending tracker</div>
      </div>
      <div class="header-icon">📊</div>
    </div>

    <!-- Period tabs -->
    <nav class="period-tabs" role="tablist">
      <button class="tab-btn" data-period="daily"   role="tab">Daily</button>
      <button class="tab-btn" data-period="weekly"  role="tab">Weekly</button>
      <button class="tab-btn active" data-period="monthly" role="tab">Monthly</button>
    </nav>

    <!-- Hero: total spent -->
    <section class="hero">
      <div class="hero-label">Total Spent</div>
      <div class="hero-amount skeleton" id="total-amount">$0.00</div>
      <div class="hero-period" id="period-label">This Month</div>
    </section>

    <!-- Category chips filter -->
    <div class="category-chips-scroll">
      <div class="category-chips-inner" id="category-chips">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- Charts row -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-label">By Category</div>
        <div class="chart-placeholder" id="donut-placeholder">
          <div class="skeleton" style="width:100%;height:100px;border-radius:8px;"></div>
        </div>
        <img id="donut-chart" src="" alt="Spending by category" style="display:none;" />
      </div>
    </div>

    <!-- Category breakdown -->
    <div class="card">
      <div class="section-title">Categories</div>
      <div id="breakdown-list">
        <div class="skeleton" style="height:14px;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:14px;margin-bottom:12px;width:80%;"></div>
        <div class="skeleton" style="height:14px;width:60%;"></div>
      </div>
    </div>

    <!-- Recent transactions -->
    <div class="card">
      <div class="section-title">Recent Transactions</div>
      <div id="transactions-list">
        <div class="skeleton" style="height:40px;margin-bottom:10px;border-radius:10px;"></div>
        <div class="skeleton" style="height:40px;margin-bottom:10px;border-radius:10px;"></div>
        <div class="skeleton" style="height:40px;border-radius:10px;"></div>
      </div>
    </div>

    <!-- AI Insights -->
    <div class="card">
      <div class="section-title">AI Insights <span style="color:var(--text-muted);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0;">(monthly)</span></div>
      <div class="insights-card">
        <div class="insights-icon">💡</div>
        <div class="insights-text skeleton" id="insights-text" style="min-height:48px;">Loading...</div>
      </div>
    </div>

  </div>

  <script>
    const PERIOD_LABELS = {
      daily:   'Today',
      weekly:  'This Week',
      monthly: 'This Month',
    };

    const CATEGORY_EMOJIS = {
      'Food & Drink':  '🍔',
      'Transport':     '🚗',
      'Entertainment': '🎬',
      'Shopping':      '🛍️',
      'Health':        '💊',
      'Utilities':     '💡',
      'Travel':        '✈️',
      'Pets':          '🐾',
      'Other':         '📦',
    };

    let currentPeriod = 'monthly';
    let selectedCategory = null;

    // ── API helpers ───────────────────────────────────────────────────────
    async function apiFetch(path) {
      // Use a relative URL so the request always matches the page's scheme
      // (avoids mixed-content blocks when Railway proxies http→https).
      const res = await fetch(path);
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
      return res.json();
    }

    // ── Renderers ─────────────────────────────────────────────────────────
    function renderBreakdown(breakdown, totalSpent) {
      if (!breakdown || breakdown.length === 0) {
        return '<div class="empty-state">No transactions yet for this period.</div>';
      }
      return breakdown.map(item => {
        const pct = totalSpent > 0 ? (item.total / totalSpent * 100).toFixed(1) : 0;
        return `
          <div class="category-row">
            <div class="category-header">
              <div class="category-dot" style="background:${item.color}"></div>
              <span class="category-name">${item.category}</span>
              <span class="category-meta">${item.count} txn${item.count !== 1 ? 's' : ''}</span>
              <span class="category-amount">$${item.total.toFixed(2)}</span>
            </div>
            <div class="progress-track">
              <div class="progress-fill" data-width="${pct}" style="background:${item.color}"></div>
            </div>
          </div>`;
      }).join('');
    }

    function animateProgressBars() {
      // Trigger CSS transition by setting width after a brief delay
      requestAnimationFrame(() => {
        document.querySelectorAll('.progress-fill[data-width]').forEach(el => {
          const w = el.getAttribute('data-width');
          requestAnimationFrame(() => { el.style.width = w + '%'; });
        });
      });
    }

    function renderTransactions(transactions) {
      if (!transactions || !Array.isArray(transactions) || transactions.length === 0) {
        return '<div class="empty-state">No transactions yet.</div>';
      }
      return transactions.map(t => {
        const emoji  = CATEGORY_EMOJIS[t.category] || '📦';
        const amount = isNaN(parseFloat(t.amount)) ? '0.00' : parseFloat(t.amount).toFixed(2);
        const date   = t.created_at
          ? new Date(t.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
          : '—';
        return `
          <div class="tx-row">
            <div class="tx-icon">${emoji}</div>
            <div class="tx-details">
              <div class="tx-merchant">${t.merchant || 'Unknown'}</div>
              <div class="tx-meta">${t.category || 'Other'} · ${date}</div>
            </div>
            <div class="tx-amount">-$${amount}</div>
          </div>`;
      }).join('');
    }

    // ── Category chips ────────────────────────────────────────────────────
    // Chips are built once per period; clicks only toggle classes/styles.
    function setActiveChip(activeCat) {
      document.querySelectorAll('.cat-chip').forEach(chip => {
        const cat = chip.dataset.cat || null;
        const isActive = cat === activeCat;
        chip.classList.toggle('active', isActive);
        const color = chip.dataset.color;
        chip.style.borderColor = isActive && color ? color     : '';
        chip.style.background  = isActive && color ? color + '22' : '';
      });
    }

    function buildCategoryChips(categories) {
      const container = document.getElementById('category-chips');

      const allChip = `
        <div class="cat-chip active" data-cat="" data-color="">
          <div class="cat-chip-emoji">🏷️</div>
          <div class="cat-chip-name">All</div>
          <div class="cat-chip-amount">—</div>
        </div>`;

      const chips = categories
        .filter(c => c.total > 0)
        .map(c => {
          const emoji = CATEGORY_EMOJIS[c.name] || '📦';
          return `
            <div class="cat-chip" data-cat="${c.name}" data-color="${c.color}">
              <div class="cat-chip-emoji">${emoji}</div>
              <div class="cat-chip-name">${c.name}</div>
              <div class="cat-chip-amount">$${c.total.toFixed(0)}</div>
            </div>`;
        }).join('');

      container.innerHTML = allChip + chips;

      container.querySelectorAll('.cat-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const cat = chip.dataset.cat || null;
          // Toggle off if already selected; otherwise select
          selectedCategory = selectedCategory === cat ? null : cat;
          setActiveChip(selectedCategory);
          loadTransactions();
        });
      });
    }

    async function loadCategoryChips(period) {
      try {
        const data = await apiFetch(`/api/v1/categories?period=${period}`);
        buildCategoryChips(data.categories);
      } catch (e) {
        console.error('Category chips load failed:', e);
      }
    }

    async function loadTransactions() {
      const txList = document.getElementById('transactions-list');
      let url = `/api/v1/transactions?limit=10`;
      if (selectedCategory) url += `&category=${encodeURIComponent(selectedCategory)}`;
      try {
        const transactions = await apiFetch(url);
        txList.innerHTML = renderTransactions(transactions);
      } catch (e) {
        txList.innerHTML = `<div class="error-text">Failed to load transactions</div>`;
        console.error('Transactions load failed:', e);
      }
    }

    // ── Chart loading ─────────────────────────────────────────────────────
    function loadCharts(period) {
      const donutImg = document.getElementById('donut-chart');
      const donutPh  = document.getElementById('donut-placeholder');

      donutImg.style.display = 'none';
      donutPh.style.display  = 'flex';

      donutImg.onload  = () => { donutPh.style.display = 'none'; donutImg.style.display = 'block'; };
      donutImg.onerror = () => { donutPh.innerHTML = '<div class="error-text">Chart unavailable</div>'; };

      donutImg.src = `/api/v1/charts/donut?period=${period}`;
    }

    // ── Main load ─────────────────────────────────────────────────────────
    async function loadDashboard(period) {
      currentPeriod = period;
      selectedCategory = null;

      // Update active tab
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.period === period);
      });

      // Update period label
      document.getElementById('period-label').textContent = PERIOD_LABELS[period];

      // Reset hero to skeleton
      const amountEl = document.getElementById('total-amount');
      amountEl.textContent = '$0.00';
      amountEl.classList.add('skeleton');

      // Load charts and category chips (async, independent)
      loadCharts(period);
      loadCategoryChips(period);

      // Load summary + breakdown
      try {
        const summary = await apiFetch(`/api/v1/summary?period=${period}`);
        amountEl.classList.remove('skeleton');
        amountEl.textContent = `$${summary.total_spent.toFixed(2)}`;
        document.getElementById('breakdown-list').innerHTML =
          renderBreakdown(summary.breakdown, summary.total_spent);
        animateProgressBars();
      } catch (e) {
        amountEl.classList.remove('skeleton');
        amountEl.textContent = '—';
        document.getElementById('breakdown-list').innerHTML =
          `<div class="error-text">Failed to load categories</div>`;
        console.error('Summary load failed:', e);
      }

      // Load transactions (respects selectedCategory)
      loadTransactions();
    }

    async function loadInsights() {
      const el = document.getElementById('insights-text');
      try {
        const data = await apiFetch('/api/v1/insights');
        el.classList.remove('skeleton');
        el.textContent = data.summary;
      } catch (e) {
        el.classList.remove('skeleton');
        el.textContent = 'Could not load insights.';
        console.error('Insights load failed:', e);
      }
    }

    // ── Event listeners ───────────────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => loadDashboard(btn.dataset.period));
    });

    // ── Init ──────────────────────────────────────────────────────────────
    loadDashboard('monthly');
    loadInsights();
  </script>
</body>
</html>
