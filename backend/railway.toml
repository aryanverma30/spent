[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Run Alembic migrations before starting the server on every deploy.
# If migrations fail, the deploy is aborted — data safety first.
startCommand = "sh -c 'export PYTHONPATH=/app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
