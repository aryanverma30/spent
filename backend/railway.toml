[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Run Alembic migrations before starting the server on every deploy.
# If migrations fail, the deploy is aborted — data safety first.
startCommand = "PYTHONPATH=/app alembic upgrade head && PYTHONPATH=/app uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
